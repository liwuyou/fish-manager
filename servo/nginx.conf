# 养鱼生态箱 - Nginx反向代理配置
# 安装: sudo apt-get install nginx  (Linux)
# 下载: https://nginx.org/en/download.html  (Windows)
#
# 使用方法:
#   Linux:  将文件复制到 /etc/nginx/sites-available/fish-tank
#           sudo ln -s /etc/nginx/sites-available/fish-tank /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
#   Windows: 将文件复制到 nginx.conf，运行 nginx.exe

server {
    listen 80;
    server_name _;

    # ===== 静态文件 - Nginx直接返回，不进Flask =====
    location / {
        root /home/YOUR_USER/fish-tank/servo/static;
        index index.html;
        expires 1h;                # 浏览器缓存1小时
        add_header Cache-Control "public, no-transform";
    }

    # ===== API请求 - 转发给Flask =====
    location /api/ {
        proxy_pass http://127.0.0.1:7965;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 请求体限制（防止大包攻击）
        client_max_body_size 1m;
        client_body_buffer_size 128k;
    }

    # ===== 设备 WebSocket - 转发给Flask =====
    location /ws/device {
        proxy_pass http://127.0.0.1:7965;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket超时设置
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ===== 客户端 WebSocket - 转发给Flask =====
    location /ws/client {
        proxy_pass http://127.0.0.1:7965;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket超时设置
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ===== 日志 =====
    access_log /var/log/nginx/fish-tank-access.log;
    error_log /var/log/nginx/fish-tank-error.log;
}
